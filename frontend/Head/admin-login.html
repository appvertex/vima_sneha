<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vima Sneha · Admin Login</title>
<link rel="icon" type="image/png" href="../assets/images/logo.png" />
<link rel="shortcut icon" type="image/png" href="../assets/images/logo.png" />
<link rel="apple-touch-icon" href="../assets/images/logo.png" />
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --pm: #B47FA6;
  --dm: #7A4F72;
  --dkm: #4E2E4A;
  --gold: #D4A853;
  --gd: #A07830;
  --lt: #7a6878;
  --bg: #FBF4ED;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
body {
  font-family: 'Poppins', sans-serif;
  background: var(--bg);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

#login-page {
  width: 100%;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, #FAF5F9 0%, #F2E8EF 50%, #FBF4ED 100%);
  position: relative;
}

.login-orbs {
  position: absolute;
  inset: 0;
  pointer-events: none;
}

.login-orb {
  position: absolute;
  border-radius: 50%;
  filter: blur(60px);
  animation: orbPulse 8s ease-in-out infinite alternate;
}

.login-orb:nth-child(1) {
  width: 500px;
  height: 500px;
  background: radial-gradient(circle, rgba(180, 127, 166, .3), transparent 70%);
  top: -150px;
  left: -100px;
}

.login-orb:nth-child(2) {
  width: 400px;
  height: 400px;
  background: radial-gradient(circle, rgba(212, 168, 83, .25), transparent 70%);
  bottom: -100px;
  right: -80px;
  animation-delay: -3s;
}

@keyframes orbPulse {
  0% { transform: scale(1) translate(0, 0); }
  100% { transform: scale(1.2) translate(20px, -30px); }
}



.login-card {
  position: relative;
  z-index: 10;
  width: 440px;
  max-width: 95vw;
  background: rgba(255, 255, 255, .85);
  backdrop-filter: blur(20px);
  border-radius: 28px;
  padding: 3rem 2.5rem;
  border: 1px solid rgba(180, 127, 166, .2);
  box-shadow: 0 30px 80px rgba(122, 79, 114, .18);
  animation: loginFadeIn .8s cubic-bezier(.23, 1, .32, 1) both;
}

@keyframes loginFadeIn {
  from { opacity: 0; transform: translateY(40px) scale(.95); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

.login-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: linear-gradient(135deg, rgba(180, 127, 166, .15), rgba(212, 168, 83, .1));
  border: 1px solid rgba(180, 127, 166, .3);
  border-radius: 20px;
  padding: 6px 14px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--dm);
  margin-bottom: 1.5rem;
}

.login-card h1 {
  font-size: 28px;
  font-weight: 800;
  margin-bottom: .4rem;
  background: linear-gradient(135deg, var(--dkm), var(--pm), var(--gold));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.login-card .sub {
  font-size: 13px;
  color: var(--lt);
  margin-bottom: 2rem;
  font-weight: 300;
}

.form-group {
  margin-bottom: 1.2rem;
}

.form-group label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  color: var(--dm);
  margin-bottom: .5rem;
}

.form-group input {
  width: 100%;
  padding: 12px 16px;
  border-radius: 14px;
  border: 1.5px solid rgba(180, 127, 166, .3);
  background: rgba(255, 255, 255, .7);
  font-family: 'Poppins', sans-serif;
  font-size: 14px;
  outline: none;
  transition: border-color .2s;
}

.form-group input:focus {
  border-color: var(--pm);
}

.btn-login {
  width: 100%;
  padding: 13px;
  border: none;
  border-radius: 16px;
  background: linear-gradient(135deg, var(--dkm), var(--pm) 60%, var(--gold));
  color: #fff;
  font-family: 'Poppins', sans-serif;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  box-shadow: 0 6px 25px rgba(122, 79, 114, .35);
  transition: all .3s ease;
  margin-top: 1rem;
}

.btn-login:hover {
  transform: translateY(-2px);
  box-shadow: 0 12px 40px rgba(122, 79, 114, .45);
}

.error-msg {
  color: #c62828;
  font-size: 12px;
  margin-top: 0.5rem;
  text-align: center;
  display: none;
}

.login-footer {
  text-align: center;
  margin-top: 1.5rem;
  font-size: 12px;
  color: var(--lt);
}

.login-footer span {
  color: var(--pm);
  font-weight: 600;
}

@media (max-width: 768px) {
  /* removed admin-selector media query */
}
</style>
</head>
<body>

<div id="login-page">
  <div class="login-orbs">
    <div class="login-orb"></div>
    <div class="login-orb"></div>
  </div>



  <div class="login-card">
    <div class="login-badge" id="panel-badge">🛡️ Admin Control</div>
    <h1 id="login-title">Welcome Back</h1>
    <p class="sub" id="login-sub">Access the Vima Sneha management dashboard.</p>
    
    <div class="form-group">
      <label>Username</label>
      <input type="text" id="user" placeholder="Enter username" autocomplete="username">
    </div>
    
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="pass" placeholder="••••••••" autocomplete="current-password">
    </div>
    
    <div id="error-msg" class="error-msg">Invalid credentials. Please try again.</div>
    
    <button class="btn-login" id="login-btn" onclick="login()">Sign In to Dashboard →</button>
    
    <p class="login-footer">Admin username is <span>admin</span>. Use the password you set in Cloudflare.</p>
    
    <div style="text-align: center; margin-top: 1rem; opacity: 0.5;">
      <a href="#" onclick="resetAdminData(event)" style="color: var(--lt); font-size: 11px; text-decoration: none;">Forgot password? Reset to Defaults</a>
    </div>
  </div>
</div>

<script>window.VS_API_BASE = 'https://vima-sneha-api.vimasneha.workers.dev';</script>
<script src="../assets/js/vs-backend.js?v=20260704"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  // Redirection & UI Logic
  const tabs = document.querySelectorAll('.selector-item');
  const urlParams = new URLSearchParams(window.location.search);
  const allowedRedirects = new Set(['admin.html', 'admin-counselling.html', 'admin-insurance.html']);
  const redirectTarget = getSafeRedirect(urlParams.get('redirect'));

  function getSafeRedirect(value) {
    return allowedRedirects.has(value) ? value : 'admin.html';
  }

  // Update UI text based on target
  const title = document.getElementById('login-title');
  const sub = document.getElementById('login-sub');
  const badge = document.getElementById('panel-badge');
  
  if (redirectTarget === 'admin-counselling.html') {
    title.textContent = 'Counselling Portal';
    sub.textContent = 'Manage expert profiles and live sessions.';
    badge.textContent = '🧠 Counselling Admin';
  } else if (redirectTarget === 'admin-insurance.html') {
    title.textContent = 'Insurance Portal';
    sub.textContent = 'Update insurance products and trust metrics.';
    badge.textContent = '🛡️ Insurance Admin';
  } else {
    title.textContent = 'Main Dashboard';
    sub.textContent = 'Access central site management and settings.';
    badge.textContent = '⚙️ Master Admin';
  }

  // Define login globally for the onclick handler
  window.login = async function() {
    const userField = document.getElementById('user');
    const passField = document.getElementById('pass');
    const u = userField.value.trim();
    const p = passField.value;
    const btn = document.getElementById('login-btn');
    const err = document.getElementById('error-msg');
    btn.textContent = 'Signing in...';
    btn.disabled = true;
    err.style.display = 'none';
    try {
      await VSBackend.login(u, p);
      btn.textContent = 'Redirecting...';
      window.location.href = redirectTarget;
    } catch (error) {
      err.style.display = 'block';
      btn.textContent = 'Sign In to Dashboard →';
      btn.disabled = false;
      setTimeout(() => {
        err.style.display = 'none';
      }, 3000);
    }
  };

  window.resetAdminData = function(event) {
    if (event) event.preventDefault();
    alert('Password reset is handled server-side now. Please contact the site owner to change the admin password.');
  };

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') window.login();
  });

  // If already logged in, redirect away
  (async () => {
    try {
      await VSBackend.request('/api/admin/me');
      window.location.href = redirectTarget;
    } catch (error) {}
  })();
});
</script>
</body>
</html>
