<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vima Sneha · Page Studio</title>
<link rel="icon" type="image/png" href="../assets/images/logo.png" />
<link rel="shortcut icon" type="image/png" href="../assets/images/logo.png" />
<link rel="apple-touch-icon" href="../assets/images/logo.png" />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,500;0,600;0,700;0,800;1,800&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --rose:#b47fa6;
  --rose-deep:#7a4f72;
  --rose-ink:#4e2e4a;
  --rose-soft:#efe3ea;
  --gold:#d4a853;
  --gold-deep:#a07830;
  --mist:#faf5f9;
  --text:#2d2430;
  --muted:#756977;
  --line:rgba(122,79,114,.12);
  --glass:rgba(255,255,255,.72);
  --shadow:0 24px 60px rgba(122,79,114,.14);
  --shadow-soft:0 12px 30px rgba(122,79,114,.1);
  --radius-xl:28px;
  --radius-lg:22px;
  --radius-md:16px;
}
html{scroll-behavior:smooth}
body{
  font-family:"Plus Jakarta Sans",Manrope,sans-serif;
  background:
    radial-gradient(circle at top left, rgba(212,168,83,.18), transparent 32%),
    radial-gradient(circle at 85% 12%, rgba(180,127,166,.18), transparent 26%),
    linear-gradient(180deg, #fdf7fb 0%, #f8f1f7 50%, #f7f5f8 100%);
  color:var(--text);
  min-height:100vh;
  overflow-x:hidden;
}
button,input,textarea,select{font:inherit}
a{text-decoration:none;color:inherit}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:rgba(122,79,114,.25);border-radius:999px}
::-webkit-scrollbar-track{background:transparent}

.app-shell{max-width:1520px;margin:0 auto;padding:20px 20px 60px}
.topbar{
  position:sticky;top:16px;z-index:50;
  display:flex;align-items:center;justify-content:space-between;gap:18px;
  background:rgba(255,255,255,.78);
  backdrop-filter:blur(22px);
  border:1px solid rgba(255,255,255,.6);
  box-shadow:var(--shadow-soft);
  border-radius:999px;
  padding:14px 18px;
}
.brand-block{display:flex;align-items:center;gap:14px;min-width:0}
.brand-mark{
  width:46px;height:46px;border-radius:18px;flex:none;
  background:linear-gradient(135deg,var(--rose-deep),var(--gold));
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-weight:800;font-size:15px;box-shadow:0 10px 24px rgba(122,79,114,.24);
}
.brand-copy{min-width:0}
.brand-copy h1{font-size:16px;font-weight:800;letter-spacing:-.02em}
.brand-copy p{font-size:12px;color:var(--muted)}
.top-actions{display:flex;align-items:center;gap:10px;flex-wrap:wrap;justify-content:flex-end}
.status-pill,.ghost-btn,.save-btn,.view-btn{
  border-radius:999px;border:1px solid transparent;padding:11px 16px;font-size:13px;font-weight:700;
  display:inline-flex;align-items:center;gap:8px;cursor:pointer;transition:transform .2s ease,box-shadow .2s ease,background .2s ease,border-color .2s ease,color .2s ease;
}
.status-pill{background:rgba(122,79,114,.08);color:var(--rose-deep);cursor:default}
.status-pill.dirty{background:rgba(212,168,83,.14);color:var(--gold-deep)}
.ghost-btn{
  background:rgba(255,255,255,.65);color:var(--rose-ink);border-color:rgba(122,79,114,.12)
}
.view-btn{
  background:rgba(212,168,83,.12);color:var(--gold-deep);border-color:rgba(212,168,83,.2)
}
.save-btn{
  background:linear-gradient(135deg,var(--rose-deep),var(--rose));
  color:#fff;box-shadow:0 16px 30px rgba(122,79,114,.26)
}
.ghost-btn:hover,.view-btn:hover,.save-btn:hover{transform:translateY(-1px)}

.studio-nav{
  display:flex;gap:10px;flex-wrap:wrap;
  padding:18px 0 8px;
}
.studio-tab{
  border:0;border-radius:999px;padding:12px 16px;font-size:13px;font-weight:800;
  background:rgba(255,255,255,.56);color:var(--muted);cursor:pointer;
  border:1px solid rgba(122,79,114,.1);backdrop-filter:blur(14px);
}
.studio-tab.active{
  background:linear-gradient(135deg,var(--rose-ink),var(--rose-deep));
  color:#fff;box-shadow:0 14px 28px rgba(122,79,114,.2)
}
.studio-meta{
  display:flex;align-items:flex-end;justify-content:space-between;gap:18px;
  padding:16px 2px 18px;
}
.studio-meta-copy h2{font-size:34px;letter-spacing:-.04em;font-weight:800;color:var(--rose-ink)}
.studio-meta-copy p{font-size:15px;color:var(--muted);max-width:780px;line-height:1.6;margin-top:8px}
.workspace{display:flex;flex-direction:column;gap:20px}

.glass-section{
  background:var(--glass);
  border:1px solid rgba(255,255,255,.6);
  border-radius:36px;
  box-shadow:var(--shadow);
  backdrop-filter:blur(22px);
  overflow:hidden;
}
.section-head{
  display:flex;align-items:center;justify-content:space-between;gap:14px;
  padding:20px 24px 0;
}
.section-head h3{font-size:18px;font-weight:800;color:var(--rose-ink);letter-spacing:-.02em}
.section-head p{font-size:13px;color:var(--muted);margin-top:6px}
.section-tools{display:flex;gap:10px;flex-wrap:wrap}
.inline-btn,.danger-btn,.mini-btn{
  border:0;border-radius:999px;padding:10px 14px;font-size:12px;font-weight:800;cursor:pointer;
  display:inline-flex;align-items:center;gap:6px;transition:transform .2s ease,background .2s ease,color .2s ease;
}
.inline-btn{background:rgba(122,79,114,.08);color:var(--rose-deep)}
.mini-btn{background:#fff;color:var(--rose-ink);border:1px solid rgba(122,79,114,.12)}
.danger-btn{background:rgba(244,67,54,.12);color:#bf2c2c}
.inline-btn:hover,.mini-btn:hover,.danger-btn:hover{transform:translateY(-1px)}

.hero-stage{
  position:relative;
  padding:30px 24px 28px;
  overflow:hidden;
}
.hero-stage::before{
  content:"";position:absolute;inset:0;pointer-events:none;opacity:.95;
  background:
    radial-gradient(circle at 18% 22%, rgba(255,255,255,.16), transparent 18%),
    radial-gradient(circle at 82% 18%, rgba(240,208,138,.2), transparent 22%),
    radial-gradient(circle at 78% 82%, rgba(255,255,255,.14), transparent 18%);
}
.gallery-theme{background:linear-gradient(135deg,#fbf5fb 0%,#f3e4ef 45%,#f8f1e5 100%)}
.news-theme{background:linear-gradient(135deg,#4e2e4a 0%,#7a4f72 44%,#b47fa6 72%,#d4a853 100%);color:#fff}
.contact-theme{background:linear-gradient(135deg,#fff8fb 0%,#f4e7ee 48%,#f7f3f8 100%)}
.plans-theme{background:linear-gradient(135deg,#fffaf1 0%,#f5ede0 44%,#f6f0fb 100%)}
.hero-grid{position:relative;z-index:1;display:grid;grid-template-columns:1.25fr .95fr;gap:20px;align-items:stretch}
.surface-card{
  background:rgba(255,255,255,.68);
  border:1px solid rgba(255,255,255,.58);
  border-radius:30px;
  box-shadow:var(--shadow-soft);
  backdrop-filter:blur(18px);
  padding:22px;
}
.news-theme .surface-card{background:rgba(255,255,255,.11);border-color:rgba(255,255,255,.16);box-shadow:none}
.kicker-label{font-size:11px;font-weight:800;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:10px}
.news-theme .kicker-label{color:rgba(255,255,255,.74)}

.badge-input,.chip-input,.micro-input,.link-input,.meta-input,.body-input,.display-input,.display-copy,.display-title,.display-accent,.display-inline{
  width:100%;border:1px solid transparent;outline:none;transition:border-color .2s ease,background .2s ease,box-shadow .2s ease;
}
.badge-input{
  max-width:320px;border-radius:999px;padding:12px 16px;background:rgba(255,255,255,.72);
  font-size:12px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:var(--rose-deep)
}
.news-theme .badge-input{background:rgba(255,255,255,.16);color:#fff}
.display-title{
  background:transparent;padding:0;font-size:52px;line-height:1.02;font-weight:800;letter-spacing:-.06em;color:inherit
}
.display-accent{
  background:transparent;padding:0;font-size:40px;line-height:1.05;font-weight:800;font-style:italic;letter-spacing:-.04em;
  color:var(--gold)
}
.display-copy{
  background:transparent;padding:0;min-height:108px;resize:vertical;border:0;font-size:17px;line-height:1.75;color:inherit;opacity:.92
}
.field-stack{display:flex;flex-direction:column;gap:14px}
.helper-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}
.helper-card{
  background:rgba(255,255,255,.72);border:1px solid rgba(122,79,114,.1);border-radius:24px;padding:18px
}
.news-theme .helper-card{background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.14)}
.field-label{display:block;font-size:11px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.news-theme .field-label{color:rgba(255,255,255,.68)}
.chip-input,.meta-input,.link-input,.body-input,.display-inline{
  border-radius:16px;padding:13px 15px;background:rgba(255,255,255,.78);font-size:14px;font-weight:600;color:var(--text);border-color:rgba(122,79,114,.08)
}
.news-theme .chip-input,.news-theme .meta-input,.news-theme .link-input,.news-theme .body-input,.news-theme .display-inline{
  background:rgba(255,255,255,.12);color:#fff;border-color:rgba(255,255,255,.12)
}
.body-input{min-height:96px;resize:vertical}
.display-inline{background:transparent;border-color:transparent;padding:0;font-size:inherit}
.display-inline::placeholder,.display-title::placeholder,.display-copy::placeholder,.display-accent::placeholder{color:rgba(117,105,119,.65)}
.news-theme .display-inline::placeholder,.news-theme .display-title::placeholder,.news-theme .display-copy::placeholder,.news-theme .display-accent::placeholder{color:rgba(255,255,255,.45)}
.badge-input:focus,.chip-input:focus,.meta-input:focus,.link-input:focus,.body-input:focus,.display-input:focus,.display-copy:focus,.display-title:focus,.display-accent:focus,.display-inline:focus{
  border-color:rgba(212,168,83,.38);box-shadow:0 0 0 4px rgba(212,168,83,.12)
}
.display-title:focus,.display-copy:focus,.display-accent:focus,.display-inline:focus{border-radius:18px;padding:8px 10px;background:rgba(255,255,255,.22)}
.news-theme .display-title:focus,.news-theme .display-copy:focus,.news-theme .display-accent:focus,.news-theme .display-inline:focus{background:rgba(255,255,255,.08)}

.pill-row{display:flex;flex-wrap:wrap;gap:12px;padding:0 24px 24px}
.editable-pill{
  display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:999px;
  background:rgba(255,255,255,.75);border:1px solid rgba(122,79,114,.1);box-shadow:var(--shadow-soft)
}
.editable-pill .material-symbols-outlined{font-size:18px;color:var(--rose-deep)}
.editable-pill input{
  width:110px;border:0;background:transparent;font-size:13px;font-weight:800;color:var(--rose-ink);outline:none
}
.editable-pill button{
  width:26px;height:26px;border-radius:999px;border:0;background:rgba(122,79,114,.08);color:var(--rose-ink);cursor:pointer
}

.mosaic-grid,.card-grid,.contact-grid,.plan-grid{display:grid;gap:18px;padding:0 24px 24px}
.mosaic-grid{grid-template-columns:repeat(12,minmax(0,1fr));grid-auto-rows:minmax(260px,auto)}
.mosaic-card,.story-card,.contact-card-editor,.plan-card{
  background:#fff;border:1px solid var(--line);border-radius:30px;overflow:hidden;box-shadow:var(--shadow-soft)
}
.mosaic-card.large{grid-column:span 6}
.mosaic-card.wide{grid-column:span 8}
.mosaic-card.small{grid-column:span 4}
.mosaic-preview{
  position:relative;min-height:190px;padding:22px;color:#fff;display:flex;flex-direction:column;justify-content:flex-end;gap:10px;
  background:linear-gradient(135deg,#7a4f72 0%,#b47fa6 68%,#d4a853 100%);
}
.mosaic-preview.has-image{
  background-size:cover;background-position:center
}
.mosaic-preview.has-image::before{
  content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(45,36,48,.1),rgba(45,36,48,.64))
}
.mosaic-preview > *{position:relative;z-index:1}
.icon-badge{
  width:58px;height:58px;border-radius:20px;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.24);
  display:flex;align-items:center;justify-content:center
}
.icon-input{
  width:100%;background:transparent;border:0;color:#fff;font-size:30px;text-align:center;outline:none
}
.mosaic-title,.story-title,.contact-title,.plan-title-input{
  background:transparent;border:0;color:inherit;font-size:28px;font-weight:800;letter-spacing:-.04em;outline:none;width:100%
}
.mosaic-desc,.story-desc,.contact-sub,.plan-point-input{
  background:transparent;border:0;color:inherit;opacity:.88;outline:none;width:100%;font-size:14px;line-height:1.6
}
.mosaic-card .editor-body,.story-editor,.contact-editor-body,.plan-card-body{padding:18px}
.mini-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
.mini-field{display:flex;flex-direction:column;gap:7px}
.mini-field label,.point-label{font-size:10px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
.select-clean,.text-clean,.textarea-clean{
  width:100%;border-radius:14px;border:1px solid var(--line);background:#fbf9fc;padding:12px 13px;font-size:13px;font-weight:600;color:var(--text);outline:none
}
.textarea-clean{min-height:92px;resize:vertical}
.item-actions{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;margin-top:16px}
.shift-actions{display:flex;gap:8px;flex-wrap:wrap}

.news-column{display:grid;grid-template-columns:1.15fr .9fr;gap:20px;padding:0 24px 24px}
.story-card.featured{
  background:linear-gradient(135deg,#4e2e4a 0%,#7a4f72 42%,#b47fa6 74%,#d4a853 100%);color:#fff;border:0
}
.story-visual{
  position:relative;min-height:260px;padding:26px;display:flex;flex-direction:column;justify-content:flex-end;gap:12px;background-size:cover;background-position:center
}
.story-visual::before{
  content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(45,36,48,.15),rgba(45,36,48,.72))
}
.story-visual > *{position:relative;z-index:1}
.story-badge{
  display:inline-flex;align-items:center;gap:8px;align-self:flex-start;
  padding:10px 14px;border-radius:999px;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.18);
  font-size:11px;font-weight:800;letter-spacing:.12em;text-transform:uppercase
}
.story-meta-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}
.article-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:18px}
.story-card.standard .story-visual{min-height:220px}

.contact-layout{display:grid;grid-template-columns:1fr 1fr;gap:20px;padding:0 24px 24px}
.contact-card-preview{
  display:flex;align-items:center;gap:16px;padding:20px;border-radius:24px;
  background:linear-gradient(180deg,#fff 0%,#fff9fd 100%);border:1px solid var(--line)
}
.contact-icon-shell{
  width:64px;height:64px;border-radius:24px;display:flex;align-items:center;justify-content:center;flex:none;background:rgba(122,79,114,.08)
}
.contact-icon-shell .material-symbols-outlined{font-size:30px}
.contact-copy{display:flex;flex-direction:column;gap:4px;flex:1}
.contact-form-shell{
  background:linear-gradient(180deg,#fff 0%,#fffafc 100%);border:1px solid var(--line);border-radius:30px;padding:24px;box-shadow:var(--shadow-soft)
}
.service-pills{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;margin:18px 0}
.service-pill-editor{
  background:#fff;border:1px solid var(--line);border-radius:18px;padding:12px 14px
}
.fake-input{background:#fff;border:1px solid var(--line);border-radius:18px;padding:14px 16px;color:#a08d9f;font-size:14px}

.plan-selector{
  display:flex;flex-wrap:wrap;gap:10px;padding:0 24px 24px
}
.plan-pill{
  border:0;border-radius:999px;padding:11px 14px;font-size:12px;font-weight:800;cursor:pointer;
  background:#fff;border:1px solid var(--line);color:var(--muted)
}
.plan-pill.active{background:linear-gradient(135deg,var(--gold),#efd79d);color:var(--gold-deep);box-shadow:0 12px 24px rgba(212,168,83,.2)}
.plan-hero{
  display:grid;grid-template-columns:1.05fr .95fr;gap:20px;padding:0 24px 24px
}
.image-frame{
  position:relative;min-height:380px;border-radius:30px;overflow:hidden;background:#f2edf1;border:1px solid var(--line)
}
.image-frame img{width:100%;height:100%;object-fit:cover;display:block}
.image-frame .overlay{
  position:absolute;left:18px;right:18px;bottom:18px;
  background:rgba(45,36,48,.72);backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,.14);
  border-radius:22px;padding:18px;color:#fff
}
.plan-card{display:flex;flex-direction:column}
.plan-card-head{
  background:linear-gradient(180deg,#fff9f1 0%,#fff 100%);
  padding:22px;border-bottom:1px solid var(--line)
}
.plan-icon-row{display:flex;align-items:center;gap:14px}
.plan-icon-badge{
  width:68px;height:68px;border-radius:24px;background:rgba(212,168,83,.16);display:flex;align-items:center;justify-content:center;color:var(--gold-deep)
}
.plan-card-body{display:flex;flex-direction:column;gap:14px}
.points-list{display:flex;flex-direction:column;gap:10px}
.point-row{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center}
.point-row input{
  width:100%;border:1px solid var(--line);border-radius:14px;padding:12px 13px;background:#fbf9fc;outline:none;font-size:13px;font-weight:600
}

.meta-note{
  padding:0 24px 24px;font-size:13px;color:var(--muted);line-height:1.7
}
.toast{
  position:fixed;right:24px;bottom:24px;z-index:80;
  background:#fff;border:1px solid rgba(122,79,114,.08);border-left:4px solid var(--gold);
  border-radius:18px;box-shadow:var(--shadow);padding:14px 16px;min-width:240px;display:none;font-size:13px;font-weight:700
}
.toast.show{display:block}

@media (max-width:1180px){
  .hero-grid,.news-column,.contact-layout,.plan-hero{grid-template-columns:1fr}
  .article-grid{grid-template-columns:1fr}
  .mosaic-card.large,.mosaic-card.wide,.mosaic-card.small{grid-column:span 12}
}
@media (max-width:860px){
  .topbar{border-radius:28px;align-items:flex-start;flex-direction:column}
  .top-actions{width:100%;justify-content:flex-start}
  .studio-meta{flex-direction:column;align-items:flex-start}
  .studio-meta-copy h2{font-size:28px}
  .display-title{font-size:40px}
  .display-accent{font-size:32px}
  .helper-grid,.mini-grid,.story-meta-grid{grid-template-columns:1fr}
  .mosaic-grid{grid-template-columns:1fr}
}
</style>
</head>

<script>
const KEY = 'vima_page_admin_data';
const PLAN_FILES = [
  'term-life-insurance.html',

function merge(base, override) {
  const out = Array.isArray(base) ? base.slice() : { ...base };
  Object.keys(override || {}).forEach((key) => {
    if (override[key] && typeof override[key] === 'object' && !Array.isArray(override[key]) && base[key]) {
      out[key] = merge(base[key], override[key]);
    } else {
      out[key] = override[key];
    }
  });
  return out;
}

function esc(value) {
  return String(value ?? '').replace(/[&<>"']/g, (char) => ({
    '&': '&amp;',
    '<': '&lt;',
    '>': '&gt;',
    '"': '&quot;',
    "'": '&#39;'
  }[char]));
}

function label(value) {
  return String(value || '').replace(/[-_]/g, ' ').replace(/\b\w/g, (char) => char.toUpperCase());
}

function categoryIcon(category) {
  return CATEGORY_ICONS[category] || 'article';

function initializeData() {
  try {
    SAVED_RAW = REMOTE_PAGES_DATA || {};
    DATA = merge(DEFAULTS, SAVED_RAW);
  } catch (error) {
    console.warn('Ignoring invalid page studio data:', error);
    DATA = JSON.parse(JSON.stringify(DEFAULTS));
    SAVED_RAW = {};
  }
  const savedPlanKeys = new Set(Object.keys(SAVED_RAW.insurancePages || {}));
  PLAN_FILES.forEach((file) => {
    if (!DATA.insurancePages[file]) DATA.insurancePages[file] = defaultPlan(file);
    DATA.insurancePages[file].__saved = savedPlanKeys.has(file);
  });
}

function serializeForSave() {
  const payload = JSON.parse(JSON.stringify(DATA));
  const savedPlans = {};
  Object.entries(payload.insurancePages || {}).forEach(([file, page]) => {
    if (!page.__saved) return;
    delete page.__saved;
    savedPlans[file] = page;
  });
  payload.insurancePages = savedPlans;
  return payload;
}

function showToast(message) {
  const toast = document.getElementById('toast');
  toast.textContent = message;
  toast.classList.add('show');
  clearTimeout(showToast.timer);
  showToast.timer = setTimeout(() => toast.classList.remove('show'), 2200);
}

function updateStatus(message) {
  if (message) lastSavedMessage = message;
  const pill = document.getElementById('status-pill');
  const text = document.getElementById('status-text');
  pill.classList.toggle('dirty', dirty);
  text.textContent = dirty ? 'Editing...' : lastSavedMessage;
}

function scheduleAutosave() {
  clearTimeout(autosaveTimer);
  autosaveTimer = setTimeout(() => saveAll(true), 900);
}

function markDirty() {
  dirty = true;
  updateStatus();
  scheduleAutosave();
}

async function saveAll(silent) {
  const payload = serializeForSave();
  await VSBackend.saveAdminContent('pages', payload);
  REMOTE_PAGES_DATA = JSON.parse(JSON.stringify(payload));
  dirty = false;
  updateStatus('Saved just now');
  if (!silent) showToast('Changes saved.');
}

function setValue(path, value) {
  const keys = path.replace(/\[(\d+)\]/g, '.$1').split('.');
  let target = DATA;
  while (keys.length > 1) {
    target = target[keys.shift()];
  }
  target[keys[0]] = value;
  if (path.startsWith('insurancePages.')) {
    const file = path.split('.')[1];
    DATA.insurancePages[file].__saved = true;
  }
  markDirty();
}

function renderWorkspace() {
  const workspace = document.getElementById('workspace');
  if (activeStudio === 'gallery') workspace.innerHTML = renderGalleryWorkspace();
  if (activeStudio === 'news') workspace.innerHTML = renderNewsWorkspace();
  if (activeStudio === 'contact') workspace.innerHTML = renderContactWorkspace();
  if (activeStudio === 'plans') workspace.innerHTML = renderPlansWorkspace();
}

function bindGlobalShortcuts() {
  document.addEventListener('keydown', (event) => {
    if ((event.metaKey || event.ctrlKey) && event.key.toLowerCase() === 's') {
      event.preventDefault();
      saveAll();
    }
  });
}

async function init() {
  document.getElementById('app').hidden = false;
  renderShellMeta();
  renderWorkspace();
  updateStatus('Saved');
  bindGlobalShortcuts();
}

async function boot() {
  try {
    await VSBackend.request('/api/admin/me');
    const response = await VSBackend.getAdminContent('pages');
    REMOTE_PAGES_DATA = response?.content || {};
    initializeData();
    init();
  } catch (error) {
    location.href = 'admin-login.html?redirect=admin-pages.html';
  }
}

boot();
</script>
