<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>News | Vima Sneha</title>
    <meta name="description" content="News page for Vima Sneha." />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="assets/images/logo.png" />
    <link rel="shortcut icon" type="image/png" href="assets/images/logo.png" />
    <link rel="apple-touch-icon" href="assets/images/logo.png" />

    <!-- Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;800&family=Plus+Jakarta+Sans:ital,wght@0,400;0,600;0,700;0,800;1,800&family=Manrope:wght@400;500;600;700&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <link href="assets/css/layout-shared.css?v=20260424-1" rel="stylesheet" />

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        window.tailwind = window.tailwind || {};
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: { DEFAULT: '#B47FA6', light: '#C9A0BB', dark: '#7A4F72' },
                        secondary: { DEFAULT: '#D4A853', light: '#F0D08A', dark: '#A6823D' },
                        surface: { DEFAULT: '#FAF5F9', dark: '#141214' }
                    },
                    fontFamily: { sans: ['"Plus Jakarta Sans"', 'Manrope', 'sans-serif'] },
                    borderRadius: { '2xl': '1.5rem', '3xl': '2rem', '4xl': '3rem' },
                    animation: {
                        'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'float': 'float 6s ease-in-out infinite',
                    },
                    keyframes: {
                        float: { '0%, 100%': { transform: 'translateY(0)' }, '50%': { transform: 'translateY(-20px)' } },
                    }
                }
            }
        };
    </script>

    <style>
        :root {
            --primary-mauve: #B47FA6;
            --secondary-mauve: #C9A0BB;
            --deep-mauve: #7A4F72;
            --light-mauve: #DCC5D5;
            --pale-mauve: #EFE3EA;
            --darkest-mauve: #4E2E4A;
            --gold: #D4A853;
            --gold-light: #F0D08A;
            --gold-dark: #A07830;
            --white: #ffffff;
            --dark-text: #2d2430;
            --light-text: #7a6878;
            --bg-base: #FAF5F9;
            --shadow-md: 0 8px 24px rgba(180, 127, 166, 0.22);
            --glass-border: rgba(255, 255, 255, 0.2);
        }

        body {
            font-family: "Plus Jakarta Sans", sans-serif;
            background-color: var(--pale-mauve);
            color: var(--dark-text);
            overflow-x: hidden;
        }

        /* ── GLASS ── */
        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        /* ── PAGE BANNER ── */
        .news-hero {
            position: relative;
            overflow: hidden;
            padding: 5.5rem 0 4rem;
            background: linear-gradient(135deg, #4E2E4A 0%, #7A4F72 42%, #B47FA6 74%, #D4A853 100%);
            border-radius: 0 0 2rem 2rem;
        }

        @media (min-width: 1024px) {
            .news-hero {
                padding: 7rem 0 4.5rem;
            }
        }

        .news-hero::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(circle at 20% 80%, rgba(212, 168, 83, 0.28) 0%, transparent 46%),
                radial-gradient(circle at 80% 20%, rgba(255, 255, 255, 0.12) 0%, transparent 42%);
        }

        .news-hero::after {
            content: '';
            position: absolute;
            inset: auto 0 -1px 0;
            height: 100px;
            background: linear-gradient(to top, var(--pale-mauve) 0%, transparent 100%);
        }

        .hero-content {
            position: relative;
            z-index: 2;
            max-width: 840px;
            margin: 0 auto;
            text-align: center;
            padding: 0 1.5rem;
        }

        .hero-content h1 {
            font-family: "Playfair Display", serif;
            font-size: clamp(2.6rem, 5vw, 4.25rem);
            line-height: 1.05;
            letter-spacing: -0.04em;
            color: white;
            margin-bottom: 1rem;
            font-weight: 800;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
        }

        .hero-content p {
            font-size: 1.05rem;
            color: rgba(255, 255, 255, 0.86);
            line-height: 1.7;
            max-width: 720px;
            margin: 0 auto;
            font-weight: 500;
        }

        @media (max-width: 768px) {
            .news-hero {
                padding: 5rem 0 3rem;
            }

            .hero-content h1 {
                font-size: 2.35rem;
            }

            .hero-content p {
                font-size: 0.98rem;
            }
        }

        .hero-content .inline-flex {
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
        }

        /* ── NEWS SECTION ── */
        .news-section {
            padding: 3rem 0 5rem;
        }

        .news-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 1.5rem;
        }

        @media (max-width: 1100px) {
            .news-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }

        @media (max-width: 768px) {
            .news-grid {
                grid-template-columns: 1fr;
            }
        }

        /* ── CATEGORY FILTERS ── */
        .category-bar {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            justify-content: center;
            padding: 0 1rem;
        }

        .category-pill {
            padding: 0.6rem 1.4rem;
            border-radius: 9999px;
            font-size: 0.8125rem;
            font-weight: 700;
            cursor: pointer;
            border: 1.5px solid rgba(180, 127, 166, 0.2);
            background: rgba(255, 255, 255, 0.5);
            color: var(--light-text);
            transition: all 300ms ease;
            backdrop-filter: blur(10px);
            white-space: nowrap;
        }

        .category-pill:hover {
            border-color: var(--primary-mauve);
            color: var(--deep-mauve);
            background: rgba(255, 255, 255, 0.8);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(180, 127, 166, 0.15);
        }

        .category-pill.active {
            background: linear-gradient(135deg, var(--primary-mauve), var(--deep-mauve));
            color: white;
            border-color: transparent;
            box-shadow: 0 8px 24px rgba(180, 127, 166, 0.35);
        }

        /* ── NEWS CARD GRID ── */
        .news-card {
            background: #ffffff;
            border: 1px solid rgba(180, 127, 166, 0.14);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 4px 18px rgba(78, 46, 74, 0.07);
            transition: transform 0.3s cubic-bezier(0.23,1,0.32,1), box-shadow 0.3s ease, border-color 0.3s ease;
            display: flex;
            flex-direction: column;
            cursor: pointer;
            min-height: 100%;
        }

        .news-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 48px rgba(78, 46, 74, 0.15);
            border-color: rgba(180, 127, 166, 0.35);
        }

        .news-card--featured {
            grid-column: 1 / -1;
            display: grid;
            grid-template-columns: 1.15fr 0.85fr;
            min-height: 420px;
        }

        @media (max-width: 900px) {
            .news-card--featured {
                grid-template-columns: 1fr;
                min-height: auto;
            }
        }

        .news-card-img-wrap {
            position: relative;
            overflow: hidden;
            background: var(--pale-mauve);
        }

        .news-card:not(.news-card--featured) .news-card-img-wrap {
            height: 210px;
        }

        .news-card--featured .news-card-img-wrap {
            min-height: 320px;
        }

        .news-card-img-placeholder {
            width: 100%;
            height: 100%;
            min-height: 210px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #4E2E4A 0%, #7A4F72 50%, #B47FA6 100%);
            font-size: 3rem;
        }

        .news-card-img-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 700ms ease;
            display: block;
        }

        .news-card:hover .news-card-img-wrap img {
            transform: scale(1.08);
        }

        .news-card-img-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(36, 14, 34, 0.55) 0%, transparent 55%);
            pointer-events: none;
        }

        .news-card-category {
            position: absolute;
            top: 1rem;
            left: 1rem;
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            padding: 0.35rem 0.85rem;
            border-radius: 9999px;
            font-size: 0.65rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: white;
            z-index: 2;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.18);
            backdrop-filter: blur(8px);
        }

        .news-card-category.cat-counselling { background: linear-gradient(135deg, rgba(180,127,166,0.92), rgba(122,79,114,0.92)); }
        .news-card-category.cat-insurance   { background: linear-gradient(135deg, rgba(212,168,83,0.95), rgba(160,120,48,0.95)); }
        .news-card-category.cat-wellness     { background: linear-gradient(135deg, rgba(139,94,126,0.92), rgba(78,46,74,0.92)); }
        .news-card-category.cat-community    { background: linear-gradient(135deg, rgba(201,160,187,0.92), rgba(122,79,114,0.92)); }
        .news-card-category.cat-announcement { background: linear-gradient(135deg, rgba(166,130,61,0.95), rgba(122,95,40,0.95)); }

        .news-body {
            padding: 1.4rem 1.5rem 1.6rem;
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        .news-card--featured .news-body {
            justify-content: center;
            padding: 2.2rem;
        }

        .news-meta {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.55rem;
            margin-bottom: 0.85rem;
        }

        .news-date {
            font-size: 0.7rem;
            color: var(--gold-dark);
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
        }

        .news-date .material-symbols-outlined {
            font-size: 13px !important;
        }

        .news-tag {
            font-size: 0.65rem;
            font-weight: 800;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            background: rgba(180, 127, 166, 0.1);
            color: var(--deep-mauve);
            border-radius: 20px;
            padding: 0.25rem 0.7rem;
            border: 1px solid rgba(180, 127, 166, 0.2);
        }

        .news-body h3 {
            font-family: "Playfair Display", serif;
            font-size: 1.08rem;
            line-height: 1.45;
            font-weight: 700;
            margin-bottom: 0.7rem;
            color: var(--dark-text);
            transition: color 0.2s;
        }

        .news-card:hover .news-body h3 {
            color: var(--deep-mauve);
        }

        .news-card--featured .news-body h3 {
            font-size: clamp(1.7rem, 3vw, 2.4rem);
            line-height: 1.15;
            margin-bottom: 0.9rem;
        }

        .news-excerpt {
            font-size: 0.875rem;
            color: var(--light-text);
            line-height: 1.75;
            flex: 1;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .news-card--featured .news-excerpt {
            -webkit-line-clamp: 5;
            font-size: 1rem;
        }

        .news-actions {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 1.1rem;
        }

        .read-more-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: linear-gradient(135deg, var(--deep-mauve), var(--primary-mauve));
            color: #fff;
            border: none;
            cursor: pointer;
            font-family: "Plus Jakarta Sans", sans-serif;
            font-size: 0.8rem;
            font-weight: 700;
            padding: 0.6rem 1.1rem;
            border-radius: 10px;
            text-decoration: none;
            transition: all 0.25s ease;
            box-shadow: 0 4px 14px rgba(122, 79, 114, 0.25);
        }

        .read-more-btn:hover {
            background: linear-gradient(135deg, var(--gold-dark), var(--gold));
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(212, 168, 83, 0.35);
        }

        .read-more-btn .material-symbols-outlined {
            font-size: 16px !important;
            transition: transform 0.2s;
        }

        .read-more-btn:hover .material-symbols-outlined {
            transform: translateX(3px);
        }

        /* ── SCROLL REVEAL ── */
        .scroll-reveal {
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.8s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .scroll-reveal.revealed {
            opacity: 1;
            transform: translateY(0);
        }

        /* ── NEWSLETTER SECTION ── */
        .newsletter-section {
            position: relative;
            background: linear-gradient(135deg, #4E2E4A 0%, #7A4F72 60%, #B47FA6 100%);
            border-radius: 2rem;
            overflow: hidden;
            padding: 4rem 2rem;
        }

        .newsletter-section::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(circle at 10% 90%, rgba(212, 168, 83, 0.2) 0%, transparent 40%),
                radial-gradient(circle at 90% 10%, rgba(255, 255, 255, 0.08) 0%, transparent 40%);
            pointer-events: none;
        }

        .newsletter-glass-input {
            background: #ffffff;
            border: 1.5px solid transparent;
            border-radius: 1rem;
            padding: 1rem 1.5rem;
            font-size: 0.9375rem;
            color: #1a202c;
            outline: none;
            transition: all 300ms ease;
            width: 100%;
            font-weight: 500;
        }

        .newsletter-glass-input::placeholder {
            color: #a0aec0;
            font-weight: 500;
        }

        .newsletter-glass-input:focus {
            border-color: var(--gold);
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(212, 168, 83, 0.15);
        }

        .newsletter-btn {
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            color: white;
            padding: 1rem 2rem;
            border-radius: 1rem;
            font-weight: 800;
            font-size: 0.9375rem;
            border: none;
            cursor: pointer;
            transition: all 300ms ease;
            white-space: nowrap;
            box-shadow: 0 8px 24px rgba(212, 168, 83, 0.35);
        }

        .newsletter-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(212, 168, 83, 0.45);
        }

        /* ── STAGGERED ANIMATION DELAYS ── */
        .news-card:nth-child(1) .scroll-reveal { transition-delay: 0.05s; }
        .news-card:nth-child(2) .scroll-reveal { transition-delay: 0.10s; }
        .news-card:nth-child(3) .scroll-reveal { transition-delay: 0.15s; }
        .news-card:nth-child(4) .scroll-reveal { transition-delay: 0.20s; }
        .news-card:nth-child(5) .scroll-reveal { transition-delay: 0.25s; }
        .news-card:nth-child(6) .scroll-reveal { transition-delay: 0.30s; }

        /* ── GRADIENT MESH ── */
        .gradient-mesh {
            position: absolute;
            inset: 0;
            background: radial-gradient(at 0% 0%, rgba(180, 127, 166, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(212, 168, 83, 0.1) 0px, transparent 50%);
            pointer-events: none;
            z-index: -1;
        }

        /* ── PAGINATION ── */
        .pagination-btn {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.875rem;
            border: 1.5px solid rgba(180, 127, 166, 0.2);
            background: rgba(255, 255, 255, 0.6);
            color: var(--light-text);
            cursor: pointer;
            transition: all 300ms ease;
            backdrop-filter: blur(8px);
        }

        .pagination-btn:hover {
            border-color: var(--primary-mauve);
            color: var(--deep-mauve);
            background: rgba(255, 255, 255, 0.9);
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(180, 127, 166, 0.15);
        }

        .pagination-btn.active {
            background: linear-gradient(135deg, var(--primary-mauve), var(--deep-mauve));
            color: white;
            border-color: transparent;
            box-shadow: 0 8px 20px rgba(180, 127, 166, 0.35);
        }

        /* ── ARTICLE MODAL ── */
        .news-modal {
            position: fixed;
            inset: 0;
            z-index: 80;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        .news-modal.hidden {
            display: none;
        }

        .news-modal-backdrop {
            position: absolute;
            inset: 0;
            background: rgba(36, 14, 34, 0.68);
            backdrop-filter: blur(10px);
        }

        .news-modal-panel {
            position: relative;
            z-index: 1;
            width: min(1020px, 100%);
            height: min(92vh, 960px);
            max-height: 92vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border-radius: 2rem;
            background: rgba(255, 255, 255, 0.96);
            border: 1px solid rgba(180, 127, 166, 0.18);
            box-shadow: 0 30px 80px rgba(36, 14, 34, 0.35);
        }

        /* ── ARTICLE MODAL HERO ── */
        .news-modal-hero {
            position: relative;
            height: 240px;
            background: linear-gradient(135deg, #4E2E4A, #7A4F72 45%, #B47FA6);
            overflow: hidden;
            border-radius: 2rem 2rem 0 0;
            flex-shrink: 0;
        }

        .news-modal-hero img {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 1;
            display: block;
        }

        .news-modal-hero img[src="data:image/gif;base64,R0lGODlhAQABAAAAACw="] {
            opacity: 0;
        }

        .news-modal-hero-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(
                to bottom,
                rgba(36, 14, 34, 0.18) 0%,
                rgba(36, 14, 34, 0.72) 100%
            );
            pointer-events: none;
        }

        .news-modal-hero-content {
            position: absolute;
            bottom: 1.5rem;
            left: 1.75rem;
            right: 1.75rem;
            z-index: 2;
        }

        .news-modal-close {
            position: absolute;
            top: 1rem;
            right: 1rem;
            width: 42px;
            height: 42px;
            border-radius: 9999px;
            border: none;
            background: rgba(255, 255, 255, 0.92);
            color: var(--dark-text);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
            z-index: 10;
            transition: background 0.2s, transform 0.2s;
            backdrop-filter: blur(8px);
        }

        .news-modal-close:hover {
            background: #fff;
            transform: scale(1.08);
        }

        .news-modal-content {
            padding: 1.75rem 2rem 2.5rem;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            min-height: 0;
        }

        .news-modal-kicker {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.38rem 0.85rem;
            border-radius: 9999px;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            color: white;
            font-size: 0.68rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .news-modal-title {
            margin-top: 0.85rem;
            font-family: "Playfair Display", serif;
            font-size: clamp(1.6rem, 3vw, 2.2rem);
            line-height: 1.2;
            letter-spacing: -0.02em;
            color: var(--dark-text);
            font-weight: 800;
        }

        .news-modal-meta {
            margin-top: 0.75rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem 1.2rem;
            color: var(--light-text);
            font-size: 0.85rem;
            font-weight: 600;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(180, 127, 166, 0.15);
        }

        .news-modal-meta span {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
        }

        .news-modal-meta .material-symbols-outlined {
            font-size: 15px !important;
            color: var(--primary-mauve);
        }

        .news-modal-summary {
            margin-top: 1.25rem;
            padding: 1rem 1.2rem;
            border-radius: 1rem;
            background: linear-gradient(135deg, rgba(212,168,83,0.08), rgba(180,127,166,0.06));
            border-left: 3px solid var(--gold);
            color: var(--dark-text);
            font-size: 1rem;
            line-height: 1.75;
            font-weight: 500;
            font-style: italic;
        }

        .news-modal-divider {
            width: 48px;
            height: 3px;
            background: linear-gradient(90deg, var(--primary-mauve), var(--gold));
            border-radius: 2px;
            margin: 1.5rem 0 1.25rem;
        }

        .news-modal-body {
            color: var(--dark-text);
            font-size: 1rem;
            line-height: 1.9;
        }

        .news-modal-body p {
            margin-bottom: 1rem;
        }

        .news-modal-body p:last-child {
            margin-bottom: 0;
        }

        .news-modal-empty {
            color: var(--light-text);
            font-style: italic;
            padding: 2rem 0;
            text-align: center;
        }

        /* No-image hero styling */
        .news-modal-hero.no-image {
            height: 150px;
        }

        .news-card {
            cursor: pointer;
        }

        .news-card:focus-visible,
        .featured-card:focus-visible,
        .news-modal-close:focus-visible {
            outline: 3px solid rgba(212, 168, 83, 0.5);

        /* ── LOADING SHIMMER ── */
        @keyframes shimmer {

        .shimmer-line {
            height: 16px;
            border-radius: 8px;

            background-size: 2000px 100%;
            animation: shimmer 2s infinite;

    </style>
</head>

<body class="safe-bottom">

    <!-- ── AURORA BACKGROUND ── -->
    <div class="fixed inset-0 -z-10 overflow-hidden pointer-events-none" aria-hidden="true">
        <div class="gradient-mesh"></div>
        <div class="absolute top-0 left-1/4 w-[500px] h-[500px] bg-primary/20 rounded-full blur-[120px] animate-pulse-slow"></div>
    </div>

    <!-- Shared Navbar (JS Mount) -->
    <div id="site-navbar-root"></div>
    <script src="assets/js/icons.js"></script>
    <script src="assets/js/navbar.js?v=20260424-1"></script>

    <!-- ── MAIN CONTENT ── -->
    <main class="pt-20 lg:pt-32 scroll-smooth">
        <section class="news-hero">
            <div class="hero-content">
                <div class="inline-flex items-center gap-2 px-4 py-1.5 rounded-full bg-white/15 backdrop-blur-sm border border-white/20 text-white/90 text-xs font-bold tracking-widest uppercase mb-5">
                    <span class="material-symbols-outlined text-sm" style="font-size: 14px;">newspaper</span>
                    <span>Latest News</span>
                </div>
                <h1>Latest <em>News</em></h1>
                <p>Stay informed with the latest insights, events, and announcements from our counselling and insurance teams.</p>
            </div>
        </section>

        <section class="news-section">
            <div class="max-w-7xl mx-auto px-6">
                <div class="category-bar scroll-reveal mb-8" id="category-filter"></div>
                <div class="news-grid" id="news-grid"></div>
                <div class="hidden text-center py-16" id="no-results"></div>
            </div>
        </section>

    <div class="news-modal hidden" id="news-article-modal" aria-hidden="true">
        <div class="news-modal-backdrop" data-news-close></div>
        <div class="news-modal-panel" role="dialog" aria-modal="true" aria-labelledby="news-modal-title">
            <div class="news-modal-hero" id="news-modal-hero">
                <img data-news-modal-image src="data:image/gif;base64,R0lGODlhAQABAAAAACw=" alt="" />
                <div class="news-modal-hero-overlay"></div>
                <button type="button" class="news-modal-close" aria-label="Close article" data-news-close>
                    <span class="material-symbols-outlined">close</span>
                </button>
            </div>
            <div class="news-modal-content">
                <span class="news-modal-kicker" data-news-modal-category>News</span>
                <h2 class="news-modal-title" id="news-modal-title" data-news-modal-title></h2>
                <div class="news-modal-meta">
                    <span data-news-modal-date></span>
                    <span data-news-modal-author></span>
                    <span data-news-modal-readtime></span>

    <!-- ── INTERACTIVE SCRIPTS ── -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {

            // ── SCROLL REVEAL OBSERVER ──
            const revealObserver = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('revealed');
                    }
                });
            }, { threshold: 0.1 });

            document.querySelectorAll('.scroll-reveal').forEach(el => revealObserver.observe(el));

            // ── CATEGORY FILTER LOGIC ──
            const categoryBtns = document.querySelectorAll('.category-pill');
            const newsCards = document.querySelectorAll('#news-grid .news-card');
            const noResults = document.getElementById('no-results');

            categoryBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    // Update active state
                    categoryBtns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');

                    const category = btn.dataset.category;
                    let visibleCount = 0;

                    // Filter cards
                    newsCards.forEach(card => {
                        const cardCategory = card.dataset.category;
                        const shouldShow = category === 'all' || cardCategory === category;

                        if (shouldShow) {
                            card.style.display = '';
                            visibleCount++;
                            // Re-trigger reveal animation
                            card.classList.remove('revealed');
                            setTimeout(() => card.classList.add('revealed'), 50);
                        } else {
                            card.style.display = 'none';
                        }
                    });

                    // Show/hide no results
                    if (noResults) {
                        noResults.classList.toggle('hidden', visibleCount > 0);
                    }
                });
            });

            // ── PAGINATION LOGIC ──
            const paginationBtns = document.querySelectorAll('#pagination .pagination-btn:not(.nav-arrow)');
            paginationBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    paginationBtns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                });
            });
        });
    </script>
</body>
